version: '3.8'

networks:
  internal:

x-app: &app
  env_file:
    - .env
  environment:
    - no_proxy: localhost,web,workers,tika
  build:
    context: .
    args:
      - UID=${UID}
      - GID=${GID}
      - http_proxy=${http_proxy}
      - https_proxy=${http_proxy}
  image: ghcr.io/next-l/enju_leaf:latest
  networks:
    internal:
  volumes:
    - ./:/enju
  depends_on:
    - postgres
    - solr
    - redis
  restart: always

services:
  web:
    <<: *app
    command: bash -c "rm -f tmp/pids/server.pid && rails s -b 0.0.0.0"
    environment:
      - WEBPACKER_DEV_SERVER_HOST=webpacker
    expose:
      - 3000

  workers:
    <<: *app
    environment:
      - QUEUE=*
    command: bundle exec rake resque:work

  webpacker:
    <<: *app
    environment:
      - NODE_ENV=development
      - WEBPACKER_DEV_SERVER_HOST=127.0.0.1
    profiles:
      - develop
    command: ./bin/webpack-dev-server
    ports:
      - 127.0.0.1:3035:3035

  solr:
    image: solr:8
    ports:
      - 127.0.0.1:8983:8983
    env_file:
      - .env
    networks:
      internal:
    volumes:
      - ./solr:/mnt/solr
    restart: always
    command: bash -c "precreate-core enju_leaf_${RAILS_ENV} /mnt/solr/configsets/sunspot/conf/; precreate-core enju_leaf_test /mnt/solr/configsets/sunspot/conf/; exec solr -f"

  postgres:
    image: postgres:13
    networks:
      internal:
    env_file:
      - .env
    ports:
      - 127.0.0.1:5432:5432

  redis:
    image: redis:6
    command: redis-server --appendonly yes
    networks:
      internal:
    expose:
      - 6379

  cantaloupe:
    image: uclalibrary/cantaloupe:5.0.5-4
    expose:
      - 8182
    environment:
      no_proxy: localhost,web
      SOURCE_STATIC: HttpSource
      HTTPSOURCE_BASICLOOKUPSTRATEGY_URL_PREFIX: http://web:3000/picture_files/
      HTTPSOURCE_BASICLOOKUPSTRATEGY_URL_SUFFIX: '.download?size=original'
      ENDPOINT_API_ENABLED: 'true'
      BASE_URI: ${CANTALOUPE_BASE_URI}
    networks:
      internal:

  tika:
    image: apache/tika:2.8.0.0
    ports:
      - 127.0.0.1:9998:9998
    restart: always
    networks:
      internal:
